# This file is read by nox session get-notebook-tests implemented in noxfile.py.
# The nox session generates a build matrix containing various test sets and
# the GitHub runners to be used to execute the tests in the resp. set.
# The matrix is then used in GitHub workflow notebook_tests.yaml to execute
# each set of tests using the assigned GitHub runner.
normal:
  runner: ubuntu-24.04
  additional_pytest_parameters:
  stable:
    tests:
      - name: First Steps notebook
        test_file: nbtest_first_steps.py
        test_backend: onprem
        wip: no-wip
      - name: SLC notebook
        test_file: nbtest_script_languages_container.py
        test_backend: onprem
        wip: no-wip
      - name: short notebook tests
        test_file: "\"nbtest_environment_test.py nbtest_itde.py\""
        test_backend: ''
        wip: no-wip
  unstable:
    tests: []
large:
  runner: int-linux-x64-4core-ubuntu24.04-1
  additional_pytest_parameters: '--nb-test-db-mem-size="8"'
  stable:
    tests: []
  unstable:
    tests: []
gpu:
  runner: int-linux-x64-4core-gpu-t4-ubuntu24.04-1
  additional_pytest_parameters: '--nb-test-with-gpu'
  stable:
    tests:
      - name: GPU UDF notebooks
        test_file: nbtest_gpu.py
        test_backend: onprem
        wip: no-wip
  unstable:
    tests: []
