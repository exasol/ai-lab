name: Release

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write
  contents: write

jobs:
  release:
    environment: AWS_RELEASE
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v1
        with:
          python-version: "3.10"

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE }}
          role-session-name: github-actions-ai-lab-release
          aws-region: ${{ vars.AWS_CI_REGION }}

      - name: Check Release
        run: poetry run -- python3 -u "./scripts/build/check_release.py" --release-tag "$GITHUB_REF_NAME"

      - name: Publish Release Build
        run: poetry run -- python3 -m exasol.ds.sandbox.main start-release-build --publish
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_CI_REGION }}
          AWS_USER_NAME: release_user
          RELEASE_DEFAULT_PASSWORD: ${{ secrets.RELEASE_DEFAULT_PASSWORD }}
          DOCKER_REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Generate Release Notes
        run: poetry run -- python3 ./scripts/build/generate_release_notes.py --release-tag "$GITHUB_REF_NAME" --output-dir "$RUNNER_TEMP/release-notes"
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_CI_REGION }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_DIR="$RUNNER_TEMP/release-notes"
          RELEASE_TITLE="$(cat "$RELEASE_DIR/release_title.txt")"
          RELEASE_NOTES="$RELEASE_DIR/release_notes.md"
          ARTIFACTS_FILE="$RELEASE_DIR/artifacts.md"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES"
            gh release upload "$GITHUB_REF_NAME" "$ARTIFACTS_FILE#artifacts.md" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES" \
              "$ARTIFACTS_FILE#artifacts.md"
          fi
