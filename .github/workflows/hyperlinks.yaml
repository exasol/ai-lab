name: Check Hyperlinks

on:
  pull_request:

jobs:
  check-links:
    name: Find Broken Links in Documentation and Jupyter Notebooks
    runs-on: ubuntu-24.04
    steps:

     - uses: actions/checkout@v5
       with:
         fetch-depth: 0

     - name: Setup Python & Poetry Environment
       uses: exasol/python-toolbox/.github/actions/python-environment@v1
       with:
         python-version: "3.11"

     - name: Check Hyperlinks in Documentation
       # Ignored URLs are in file .lycheeignore
       id: lychee
       uses: lycheeverse/lychee-action@v2.0.2
       with:
         fail: true
         args: --exclude localhost --verbose --no-progress 'doc/**/*.md' 'README.md'

     - name: Install pytest-check-links
       run: |
         # pytest-check-links only works with pytest < 9, but our main project requires pytest >= 9.0.3 (CVE fix).
         # So we create a separate isolated venv just for this step to avoid downgrading pytest in the main environment.
         python -m venv .venv-check-links
         .venv-check-links/bin/pip install -r requirements-check-links.txt

     - name: Check Hyperlinks in Jupyter Notebooks
       run: >
         .venv-check-links/bin/pytest --check-links
         --check-links-ignore https://www.transtats.bts.gov
         exasol/ds/sandbox/runtime/ansible/roles/jupyter/files/notebook/
