name: Notebook Docker Image Builder

on:
  workflow_call:
jobs:
  notebook-tests-docker-image-builder:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        wip: [no-wip, wip]
    name: Running Build Docker image - ${{ matrix.wip }}
    env:
      DOCKER_TAG: "${{ matrix.wip }}-${{ github.sha }}"
      DOCKER_IMG_ARTIFACT: "ai-lab-${{ matrix.wip }}-${{ github.sha }}"
      DOCKER_IMG_FILENAME: "ai-lab-${{ matrix.wip }}-${{ github.sha }}.tar"
      NOTEBOOK_TEST_DOCKER_IMG_ARTIFACT: "notebook-test-${{ matrix.wip }}-${{ github.sha }}"
      NOTEBOOK_TEST_DOCKER_IMG_FILENAME: "notebook-test-${{ matrix.wip }}-${{ github.sha }}.tar"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/prepare_test_env/
      - name: Create Docker Image
        run: |
            additional_options=""
            if [[ "${{ matrix.wip }}" == "wip" ]]; then
              additional_options="--work-in-progress-notebooks"
            fi
            poetry run ai-lab create-docker-image --version "$DOCKER_TAG" --log-level info $additional_options
      - name: Create Notebook Test Docker Image
        run: |
            docker build -t "exasol/notebook-test:$DOCKER_TAG" -f- . <<EOF
            FROM exasol/ai-lab:$DOCKER_TAG
            COPY test/notebooks/* /tmp/notebooks/
            RUN sudo mv /tmp/notebooks/* "\$NOTEBOOK_DEFAULTS" && sudo rm -rf /tmp/notebooks/
            RUN sudo chown -R jupyter:jupyter "\$NOTEBOOK_DEFAULTS"
            WORKDIR \$NOTEBOOK_DEFAULTS
            RUN sudo "\$JUPYTER_VENV/bin/python3" -m pip install -r test_dependencies.txt
            RUN sudo chown -R jupyter:jupyter "\$JUPYTER_VENV"
            RUN sudo chmod -R 777 "/home"
            ENV HOME=/home/jupyter
            ENV PATH=\$JUPYTER_VENV/bin:\$PATH
            EOF
      - name: Export docker image
        run: docker save -o "./$DOCKER_IMG_FILENAME" "exasol/ai-lab:$DOCKER_TAG"
      - name: Export notebook test docker image
        run: docker save -o "./$NOTEBOOK_TEST_DOCKER_IMG_FILENAME" "exasol/notebook-test:$DOCKER_TAG"
      - uses: actions/upload-artifact@v4
        name: Upload ai-lab docker image
        with:
          name: "${{ env.DOCKER_IMG_ARTIFACT }}"
          path: "./${{ env.DOCKER_IMG_FILENAME }}"
          compression-level: 5
          retention-days: 1
      - uses: actions/upload-artifact@v4
        name: Upload notebook test docker image
        with:
          name: "${{ env.NOTEBOOK_TEST_DOCKER_IMG_ARTIFACT }}"
          path: "./${{ env.NOTEBOOK_TEST_DOCKER_IMG_FILENAME }}"
          compression-level: 5
          retention-days: 1
