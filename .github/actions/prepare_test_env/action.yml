name: 'Prepare Test Environment'
description: 'A custom action performing common steps required for running tests'
inputs:
  free-disk-space:
    description: 'Whether to run disk cleanup before setting up test tooling'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
   - name: Free disk space with jlumbroso
     if: ${{ inputs.free-disk-space == 'true' }}
     uses: jlumbroso/free-disk-space@main
     with:
       tool-cache: true
       large-packages: false

   - name: Free disk space by removing large directories
     if: ${{ inputs.free-disk-space == 'true' }}
     run: |
       sudo rm -rf /usr/local/graalvm/
       sudo rm -rf /usr/local/.ghcup/
       sudo rm -rf /usr/local/share/powershell
       sudo rm -rf /usr/local/share/chromium
       sudo rm -rf /usr/local/lib/node_modules
       sudo rm -rf /opt/ghc
     shell: bash

   - name: Show available disk space
     if: ${{ inputs.free-disk-space == 'true' }}
     shell: bash
     run: df -h

   - name: Allow unprivileged user namespaces
     shell: bash
     run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

   - name: Setup Python & Poetry Environment
     uses: exasol/python-toolbox/.github/actions/python-environment@v1
     with:
       python-version: "3.10"
